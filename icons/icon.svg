<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#130728"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="pg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Purple glow blob -->
  <ellipse cx="200" cy="270" rx="180" ry="160" fill="#7c3aed" opacity="0.12" filter="url(#glow)"/>

  <!-- Bold P — purple gradient -->
  <text x="44" y="390"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="380" font-weight="900"
        fill="url(#pg)">P</text>

  <!-- me — white italic, smaller, anchored to the right of P -->
  <text x="296" y="370"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="130" font-weight="800" font-style="italic"
        fill="#ffffff" opacity="0.88">me</text>

  <!-- Lightning bolt — amber accent, top-right -->
  <polygon points="415,28 388,92 418,92 390,158 448,78 415,78" fill="#f59e0b"/>
</svg>
